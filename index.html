<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>晨涵会所-KLClub</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #1a1a1a; /* 暗黑背景 */
            padding: 15px;
            color: #fff;
            overflow-x: hidden;
        }

        /* 开屏动画样式 */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
        }

        .splash-logo {
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 20px;
            transform: translateY(50px);
            opacity: 0;
            animation: logoFade 1.2s ease-out forwards;
        }

        .splash-progress {
            width: 200px;
            height: 4px;
            background-color: #333;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0;
            height: 100%;
            background-color: #ff4444;
            animation: progressLoad 1.5s ease-out forwards;
        }

        /* 开屏动画关键帧 */
        @keyframes logoFade {
            0% { transform: translateY(50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes progressLoad {
            0% { width: 0; }
            100% { width: 100%; }
        }

        /* 顶部导航栏（增强动效） */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0 20px;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(-20px);
            animation: headerFade 0.8s ease-out 1.8s forwards;
        }

        @keyframes headerFade {
            0% { transform: translateY(-20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .logo:hover {
            color: #ff4444;
            transform: scale(1.05);
        }

        .nav {
            display: flex;
            gap: 20px;
        }

        .nav-item {
            color: #ccc;
            text-decoration: none;
            font-size: 14px;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-item:hover {
            color: #fff;
        }

        /* 导航下划线动效 */
        .nav-item::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: #ff4444;
            transition: width 0.3s ease;
        }

        .nav-item:hover::after {
            width: 100%;
        }

        .search-box {
            background-color: #2d2d2d;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 6px 10px;
            color: #fff;
            width: 200px;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            outline: none;
            border-color: #ff4444;
            box-shadow: 0 0 8px rgba(255, 68, 68, 0.3);
            width: 220px;
        }

        /* 首页卡片容器（多列网格，紧凑布局） */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            opacity: 0;
            animation: containerFade 0.8s ease-out 2s forwards;
        }

        @keyframes containerFade {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* 写真卡片样式（核心匹配参考图+增强动效） */
        .person-card {
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            aspect-ratio: 3/4; /* 固定宽高比 */
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            animation: cardFade 0.5s ease-out forwards;
        }

        /* 卡片逐个出现动画 */
        .person-card:nth-child(1) { animation-delay: 2.1s; }
        .person-card:nth-child(2) { animation-delay: 2.2s; }
        .person-card:nth-child(3) { animation-delay: 2.3s; }
        .person-card:nth-child(4) { animation-delay: 2.4s; }
        .person-card:nth-child(5) { animation-delay: 2.5s; }
        .person-card:nth-child(6) { animation-delay: 2.6s; }

        @keyframes cardFade {
            0% { transform: translateY(20px) scale(0.95); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .person-card:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.7);
        }

        /* 卡片图片 */
        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.4s ease;
        }

        .person-card:hover .card-img {
            filter: brightness(1.15) contrast(1.05);
            transform: scale(1.03);
        }

        /* 分类标签（左上角）- 三种分类不同颜色 */
        .category-tag {
            position: absolute;
            top: 8px;
            left: 8px;
            color: #fff;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 3px;
            z-index: 10;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        /* 三种分类配色 */
        .category-qingdan {
            background-color: rgba(0, 150, 0, 0.8); /* 清淡 - 绿色 */
        }

        .category-danzi {
            background-color: rgba(0, 100, 200, 0.8); /* 蛋仔 - 蓝色 */
        }

        .category-qiancengrou {
            background-color: rgba(180, 0, 0, 0.8); /* 千层肉 - 红色 */
        }

        .person-card:hover .category-tag {
            transform: scale(1.1);
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        /* 图片数量标签（右上角） */
        .count-tag {
            position: absolute;
            top: 8px;
            right: 8px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 3px;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .person-card:hover .count-tag {
            transform: scale(1.1);
        }

        /* 底部文字叠加层 */
        .card-text {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 8px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: #fff;
            font-size: 13px;
            line-height: 1.4;
            transform: translateY(5px);
            opacity: 0.8;
            transition: all 0.3s ease;
        }

        .person-card:hover .card-text {
            transform: translateY(0);
            opacity: 1;
        }

        /* 照片详情页 */
        .photo-detail {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 0;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .photo-detail.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .back-btn {
            padding: 8px 16px;
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 14px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* 按钮hover动效 */
        .back-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.6s ease;
        }

        .back-btn:hover {
            background-color: #444;
            border-color: #ff4444;
            transform: translateX(-3px);
        }

        .back-btn:hover::before {
            left: 100%;
        }

        .detail-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #fff;
            transform: translateX(-10px);
            opacity: 0;
            animation: titleFade 0.5s ease-out 0.3s forwards;
        }

        @keyframes titleFade {
            0% { transform: translateX(-10px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        /* 照片网格（详情页） */
        .photos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .photo-item {
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 3/4;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            opacity: 0;
            transform: scale(0.95);
            animation: photoItemFade 0.4s ease-out forwards;
        }

        /* 照片项逐个出现 */
        .photo-item:nth-child(1) { animation-delay: 0.4s; }
        .photo-item:nth-child(2) { animation-delay: 0.5s; }
        .photo-item:nth-child(3) { animation-delay: 0.6s; }
        .photo-item:nth-child(4) { animation-delay: 0.7s; }

        @keyframes photoItemFade {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .photo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.3s ease;
        }

        .photo-item:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 15px rgba(0,0,0,0.7);
        }

        .photo-item:hover .photo-img {
            filter: brightness(1.1);
        }

        /* 图片预览弹窗 */
        .preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .preview-modal.active {
            display: flex;
            opacity: 1;
        }

        .preview-img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .preview-modal.active .preview-img {
            transform: scale(1);
        }

        .close-preview {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 36px;
            cursor: pointer;
            transition: all 0.3s ease;
            transform: scale(1);
        }

        .close-preview:hover {
            color: #ff4444;
            transform: scale(1.2) rotate(90deg);
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
            .search-box {
                width: 150px;
            }
            .splash-logo {
                font-size: 36px;
            }
        }

        @media (max-width: 480px) {
            .container {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            .nav {
                display: none; /* 手机端隐藏导航 */
            }
            .splash-logo {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <!-- 开屏动画 -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-logo">晨涵の会所</div>
        <div class="splash-progress">
            <div class="progress-bar"></div>
        </div>
    </div>

    <!-- 顶部导航栏 -->
    <div class="header">
        <a href="#" class="logo">晨涵の会所</a>
        <div class="nav">
            <a href="#" class="nav-item">分类</a>
            <a href="#" class="nav-item">标签</a>
            <a href="#" class="nav-item">关于</a>
            <a href="#" class="nav-item">AnotherMe</a>
            <a href="https://klqn.top" class="nav-item">klqn.top</a>
        </div>
        <input type="text" class="search-box" placeholder="输入关键字搜索">
    </div>

    <!-- 首页：写真卡片列表 -->
    <div class="container" id="personContainer">
        <!-- 写真卡片1 - 清淡分类 -->
        <div class="person-card" data-person="吴子猷写真集">
            <div class="category-tag category-qingdan">清淡</div>
            <div class="count-tag">[3P]</div>
            <img src="https://s41.ax1x.com/2026/03/11/pek3PmV.png" alt="吴子猷写真集" class="card-img">
            <div class="card-text">吴子猷</div>
        </div>
        <!-- 写真卡片2 - 蛋仔分类 -->
        <div class="person-card" data-person="夏猪写真集">
            <div class="category-tag category-qiancengrou">千层肉</div>
            <div class="count-tag">[2P]</div>
            <img src="images/x1.png" alt="夏猪写真集" class="card-img">
            <div class="card-text">夏猪</div>
        </div>
        <!-- 写真卡片3 - 千层肉分类 -->
        <div class="person-card" data-person="徐博文写真集">
            <div class="category-tag category-danzi">蛋仔</div>
            <div class="count-tag">[1P]</div>
            <img src="images/xu1.png" alt="徐博文写真集" class="card-img">
            <div class="card-text">徐博文</div>
        </div>
        <!-- 写真卡片4 - 清淡分类 -->
        <div class="person-card" data-person="老乡鸡">
            <div class="category-tag category-qingdan">清淡</div>
            <div class="count-tag">[2P]</div>
            <img src="images/n1.png" alt="老乡鸡" class="card-img">
            <div class="card-text">老乡鸡</div>
        </div>
        <!-- 写真卡片5 - 蛋仔分类 -->
        <!-- 写真卡片6 - 千层肉分类 -->
        <div class="person-card" data-person="KL_Queen">
            <div class="category-tag category-qiancengrou">千层肉</div>
            <div class="count-tag">[12P]</div>
            <img src="https://s41.ax1x.com/2026/03/11/pek3AkF.jpg" alt="KL_Queen写真" class="card-img">
            <div class="card-text">KL_Queen写真</div>
        </div>

    </div>

    <!-- 照片详情页 -->
    <div class="photo-detail" id="photoDetail">
        <button class="back-btn" id="backBtn">返回首页</button>
        <h2 class="detail-title" id="detailTitle"></h2>
        <div class="photos-grid" id="photosGrid"></div>
    </div>

    <!-- 图片预览弹窗 -->
    <div class="preview-modal" id="previewModal">
        <span class="close-preview" id="closePreview">&times;</span>
        <img src="" alt="预览图片" class="preview-img" id="previewImg">
    </div>

    <script>
        // 开屏动画控制
        window.addEventListener('load', function() {
            setTimeout(function() {
                const splashScreen = document.getElementById('splashScreen');
                splashScreen.style.opacity = 0;
                splashScreen.style.transform = 'scale(1.1)';
                
                setTimeout(function() {
                    splashScreen.style.display = 'none';
                }, 800);
            }, 500); // 开屏动画持续2秒
        });

        // 模拟写真照片数据
        const personPhotos = {
            "吴子猷写真集": [
                "https://s41.ax1x.com/2026/03/11/pek3PmV.png",
                "https://s41.ax1x.com/2026/03/11/pek39O0.png",
                "https://s41.ax1x.com/2026/03/11/pek3iwT.png",
            ],
            "夏猪写真集": [
                "images/x1.png",
                "images/x2.png",
            ],
            "徐博文写真集": [
                "images/xu1.png",
            ],
            "老乡鸡": [
                "images/n1.png",
                "images/n2.png",
            ],
            "棒棒": [
                "images/w1.jpeg",
                "images/w2.jpeg",
                "images/w3.jpeg",
                "images/w4.jpeg",
                "images/w5.jpeg",
                "images/w6.jpeg",
                "images/w7.jpeg",
                "images/w8.jpeg",
                "images/w9.jpeg",
                "images/w10.jpeg",
                "images/w11.jpeg",
                "images/w12.jpeg",
                "images/w13.jpeg",
                "images/w14.jpeg",
                "images/w15.jpeg",
                "images/w16.jpeg",
            ],
            "KL_Queen写真": [
                "https://s41.ax1x.com/2026/03/11/pek3AkF.jpg",
                "https://s41.ax1x.com/2026/03/11/pek3EY4.jpg",
                "https://s41.ax1x.com/2026/03/11/pek3FTU.jpg",
                "images/kl1 (1).jpg",
                "images/kl1 (1).png",
                "images/kl1 (2).jpg",
                "images/kl1 (2).png",
                "images/kl1 (3).jpg",
                "images/kl1 (3).png",
                "images/kl1 (4).jpg",
                "images/kl1 (5).jpg",
                "images/kl1 (6).jpg",
            ],
            "猪肉大合照": [
                "images/all1.jpg"
            ]
        };

        // 获取DOM元素
        const personContainer = document.getElementById('personContainer');
        const photoDetail = document.getElementById('photoDetail');
        const detailTitle = document.getElementById('detailTitle');
        const photosGrid = document.getElementById('photosGrid');
        const backBtn = document.getElementById('backBtn');
        const previewModal = document.getElementById('previewModal');
        const previewImg = document.getElementById('previewImg');
        const closePreview = document.getElementById('closePreview');

        // 点击写真卡片显示详情页
        personContainer.addEventListener('click', function(e) {
            const card = e.target.closest('.person-card');
            if (card) {
                const personName = card.dataset.person;
                // 更新详情页标题
                detailTitle.textContent = personName;
                // 清空照片网格
                photosGrid.innerHTML = '';
                // 加载该写真的照片
                const photos = personPhotos[personName];
                photos.forEach(photoUrl => {
                    const photoItem = document.createElement('div');
                    photoItem.className = 'photo-item';
                    photoItem.innerHTML = `<img src="${photoUrl}" alt="${personName}" class="photo-img">`;
                    // 点击照片预览
                    photoItem.addEventListener('click', function() {
                        previewImg.src = photoUrl;
                        previewModal.classList.add('active');
                    });
                    photosGrid.appendChild(photoItem);
                });
                // 显示详情页，隐藏首页
                personContainer.style.display = 'none';
                photoDetail.classList.add('active');
            }
        });

        // 返回首页
        backBtn.addEventListener('click', function() {
            photoDetail.classList.remove('active');
            setTimeout(function() {
                personContainer.style.display = 'grid';
            }, 10); // 等待动画结束
        });

        // 关闭图片预览
        closePreview.addEventListener('click', function() {
            previewModal.classList.remove('active');
        });

        // 点击预览背景关闭预览
        previewModal.addEventListener('click', function(e) {
            if (e.target === previewModal) {
                previewModal.classList.remove('active');
            }
        });

        // 键盘ESC关闭预览
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                previewModal.classList.remove('active');
            }
        });
    </script>
</body>
</html>
